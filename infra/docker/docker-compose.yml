version: '3.9'

services:
  # DynamoDB Local — simulates all three regional tables
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - '8000:8000'
    command: -jar DynamoDBLocal.jar -sharedDb -inMemory
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Creates tables on startup
  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      dynamodb:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/sh -c
    command: |
      "
      aws dynamodb create-table --endpoint-url http://dynamodb:8000 \
        --table-name fortis-users \
        --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S AttributeName=userId,AttributeType=S \
        --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
        --global-secondary-indexes '[{\"IndexName\":\"userId-index\",\"KeySchema\":[{\"AttributeName\":\"userId\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]' \
        --billing-mode PAY_PER_REQUEST

      aws dynamodb create-table --endpoint-url http://dynamodb:8000 \
        --table-name fortis-tokens-local \
        --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S AttributeName=userId,AttributeType=S \
        --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
        --global-secondary-indexes '[{\"IndexName\":\"userId-index\",\"KeySchema\":[{\"AttributeName\":\"userId\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]' \
        --billing-mode PAY_PER_REQUEST
      "

  # Mailhog — catches all outgoing emails locally
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI — open http://localhost:8025 to see emails

  # Fortis auth server
  fortis:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - '3001:3001'
    depends_on:
      dynamodb:
        condition: service_healthy
      dynamodb-setup:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: 3001
      USERS_TABLE: fortis-users
      TOKENS_TABLE: fortis-tokens-local
      AWS_REGION: us-east-1
      PRIMARY_REGION: us-east-1          # writes to users table always go here
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      JWT_SECRET: dev-secret-change-in-production-min-32-chars
      BASE_URL: http://localhost:3001
      FROM_EMAIL: auth@localhost
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
